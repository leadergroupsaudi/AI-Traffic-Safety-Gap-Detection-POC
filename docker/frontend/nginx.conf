# Non-root nginx configuration — listens on port 8080
# Temp paths moved to /tmp so non-root user can write them

pid        /tmp/nginx.pid;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Redirect all temp dirs to /tmp (writable by non-root)
    client_body_temp_path /tmp/client_body_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile        on;
    keepalive_timeout 65;

    # Allow large video uploads (up to 2 GB)
    client_max_body_size 2048m;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 8080;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # SPA fallback — all unknown paths return index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API calls to the backend container
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Proxy static media served by backend
        location /snapshots/ {
            proxy_pass http://backend:8000;
        }

        location /media/ {
            proxy_pass http://backend:8000;
        }
    }
}
